<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse — Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="brand-link"><span class="brand-icon">🛒</span><span class="brand-name">Marketplace</span></a>
        <h1>Crear cuenta</h1>
        <p>Únete a nuestra plataforma de marketplace</p>
      </div>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Nombre completo</label>
          <input type="text" id="name" placeholder="Tu nombre" required class="form-input" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required class="form-input" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña <span class="hint">(mínimo 6 caracteres)</span></label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" class="form-input" />
        </div>
        <div class="form-group">
          <label for="role">Tipo de cuenta</label>
          <select id="role" class="form-input">
            <option value="DEMANDANTE">👤 Demandante — Busco productos</option>
            <option value="OFERTANTE">🏪 Ofertante — Vendo productos</option>
          </select>
        </div>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn-primary full-width" id="submitBtn">Crear cuenta</button>
      </form>
      <div class="auth-footer">
        ¿Ya tienes cuenta? <a href="/login.html">Iniciar sesión</a>
      </div>
    </div>
  </div>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('errorMsg');
      const btn    = document.getElementById('submitBtn');
      errDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      const body = {
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
        role:     document.getElementById('role').value,
      };
      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          const msg = data.error || data.errors?.[0]?.msg || 'Error al registrar';
          throw new Error(msg);
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        if (data.user.role === 'OFERTANTE')  window.location.href = '/dashboard-ofertante.html';
        else if (data.user.role === 'ADMIN') window.location.href = '/dashboard-admin.html';
        else                                 window.location.href = '/';
      } catch (err) {
        errDiv.textContent = err.message;
        errDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
